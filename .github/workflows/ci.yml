name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kagetra_test
          POSTGRES_USER: kagetra
          POSTGRES_PASSWORD: kagetra_dev
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U kagetra -d kagetra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://kagetra:kagetra_dev@localhost:5434/kagetra_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # event-line-broadcast (r-final-8 blocker):
      # apps/web/src/lib/attachment-image-render.ts は本番で `pdftoppm`
      # (poppler-utils) と `libreoffice` を spawn する。CI でも同じ
      # OS パッケージを入れておかないと、画像化テストがあれば全滅する
      # (現状は実プロセス起動を伴う Vitest は無いが、将来的に追加して
      # 動かせるよう前もって整える)。
      - name: Install poppler-utils + libreoffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            poppler-utils libreoffice-core libreoffice-writer libreoffice-calc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: Test (Vitest)
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test (Playwright E2E)
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

  deploy:
    name: Deploy to production
    needs: [ci]
    # main への push のみ。PR (pull_request) や他ブランチでは走らない。
    # fork PR には secrets が渡らないので deploy 鍵は露出しない。
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 同時デプロイを直列化し、走行中のデプロイは中断しない。
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH (deploy key + pinned host key)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to Oracle host
        run: |
          set -uo pipefail
          # auto-deploy.sh を kagetra として host に流し込む (最小権限:
          # git/build/cp は kagetra 所有、systemctl restart のみ scoped sudo)。
          # 接続失敗のみ最大3回リトライ。build 失敗 (FAILED) は即座に失敗扱い。
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            out=$(ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
              kagetra@new.hokudaicarta.com 'bash -s' < scripts/deploy/auto-deploy.sh 2>&1) || true
            echo "$out"
            if echo "$out" | grep -qE 'DEPLOY_RESULT=(SUCCESS|NOOP|SKIPPED_NOCODE)'; then
              echo "deploy ok"; exit 0
            fi
            if echo "$out" | grep -q 'DEPLOY_RESULT=FAILED'; then
              echo "::error::deploy script reported FAILED"; exit 1
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::host unreachable / no result after $attempt attempts"; exit 1
            fi
            echo "connection issue, retrying ($attempt)..."; sleep 10
          done

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
